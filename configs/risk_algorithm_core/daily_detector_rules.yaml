config_version: daily_detector_rules_v2_admin
effective_from: "2025-01-01"
config_authority: admin_only
parameter_edit_policy: read_only_for_current_stage
personalized_parameter_profiles: deferred_not_implemented
display_filter_policy: request_only_no_persistence
default_run_scope: monthly_high_risk_plus_daily_delta
config_update_semantics:
  generated_results_are_not_rewritten_by_config_change: true
  new_config_applies_to_next_detector_run: true
  historical_results_keep_detector_config_version: true
  trigger_new_detector_run_for_immediate_effect: true
detectors:
  purchase_interval_ipi:
    version: purchase_interval_ipi_v1
    enabled: true
    status: implemented
    method: median_mad_robust_z_v1
    z_hit: 1.5
    z_full: 3.5
    mad_floor_days: 3
    min_purchase_count: 4
    confidence_n: 12
    parameter_scope: manufacturer_specific
  purchase_quantity_trend:
    version: purchase_quantity_trend_v1
    enabled: true
    status: implemented
    method: simplified_ratio_v1
    recent_window_days: 90
    baseline_window_days: 365
    drop_ratio_hit: 0.6
    min_baseline_quantity: 1
    confidence_n: 6
    parameter_scope: manufacturer_specific
    demand_shape_modifiers:
      smooth: 1.0
      erratic: 0.85
      intermittent: 0.75
      lumpy: 0.65
  purchase_quantity_spike:
    version: purchase_quantity_spike_v1
    enabled: true
    status: implemented
    method: recent_base_quantity_ratio_v1
    parameter_scope: manufacturer_specific
    spike_ratio_hit: 3.0
    min_baseline_quantity: 1
    confidence_n: 6
    demand_shape_modifiers:
      smooth: 1.0
      erratic: 1.15
      intermittent: 1.3
      lumpy: 1.5
  purchase_frequency_drop:
    version: purchase_frequency_drop_v1
    enabled: true
    status: implemented
    method: recent_base_rate_ratio_v1
    recent_window_days: 90
    baseline_window_days: 365
    freq_drop_ratio: 0.6
    min_base_rate: 1.0
    confidence_base_rate: 2.0
    parameter_scope: manufacturer_specific
    demand_shape_modifiers:
      smooth: 1.0
      erratic: 0.85
      intermittent: 0.75
      lumpy: 0.65
  purchase_frequency_spike:
    version: purchase_frequency_spike_v1
    enabled: true
    status: implemented
    method: recent_base_frequency_ratio_v1
    parameter_scope: manufacturer_specific
    freq_spike_ratio: 2.0
    min_base_rate: 1.0
    confidence_base_rate: 2.0
    demand_shape_modifiers:
      smooth: 1.0
      erratic: 1.15
      intermittent: 1.3
      lumpy: 1.5
  low_price_warning:
    version: low_price_warning_v1
    enabled: true
    status: implemented
    method: configured_price_or_prior_market_p05_v1
    parameter_scope: manufacturer_specific
    reference_quantile: 0.05
    min_reference_order_count: 30
    min_reference_hospital_count: 5
    absolute_warning_prices: {}
  order_price_spread_warning:
    version: order_price_spread_warning_v1
    enabled: true
    status: implemented
    method: recent_max_min_ratio_v1
    parameter_scope: manufacturer_specific
    recent_window_days: 90
    spread_ratio_threshold: 1.8
    min_order_count: 2
  purchase_price_level_shift:
    version: purchase_price_level_shift_v1
    enabled: true
    status: implemented
    method: recent_baseline_median_ratio_v1
    parameter_scope: manufacturer_specific
    recent_window_days: 90
    baseline_window_days: 365
    upper_ratio_threshold: 1.25
    lower_ratio_threshold: 0.8
    min_recent_order_count: 2
    min_baseline_order_count: 5
  first_purchase_fact:
    version: first_purchase_fact_v1
    enabled: true
    status: implemented
    method: first_normal_completed_purchase_fact_v1
    parameter_scope: manufacturer_specific
  reactivated_purchase_fact:
    version: reactivated_purchase_fact_v1
    enabled: true
    status: implemented
    method: normal_purchase_after_silence_v1
    parameter_scope: manufacturer_specific
    configured_gap_days: 180
  sku_shrink:
    version: sku_shrink_v1
    enabled: false
    status: blocked_by_missing_domain_concept
    method: not_applicable_without_product_line_domain
    sku_shrink_ratio: 0.34
    min_baseline_sku_count: 2
  fulfillment_gap:
    version: fulfillment_gap_v1
    enabled: false
    status: blocked_by_data
    reject_days: 7
    reject_rate_hit: 0.15
    fill_ok: 0.8
    sys_min_hospital: 5
  price_competition:
    version: price_competition_v1
    enabled: false
    status: not_implemented
  peer_contrast:
    version: peer_contrast_v1
    enabled: false
    status: reserved
