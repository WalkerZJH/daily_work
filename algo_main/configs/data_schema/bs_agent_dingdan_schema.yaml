notes:
- "New desensitization policy: quantity fields share multiplier q; amount fields share multiplier m; purchase_price may be independently desensitized."
- "Allowed: ratios among quantity fields, quantity trends, relative relationships among amount fields, amount trends, and order frequency trends."
- "Forbidden: infer real unit price from amount / quantity; validate purchase_price against amount / quantity."
- "Hospital level is the clean source; hospital level detail is raw/audit only."
- "CSV is only for small samples, review mappings, and EDA summaries; not for million-row primary processing."
