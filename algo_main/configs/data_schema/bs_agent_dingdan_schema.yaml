- row_uid
- order_detail_id
- purchase_time
- province_code
- city_code
- county_code
- region_dirty_flag
- hospital_code
- drug_code
- drug_category_code
- distributor_code
- manufacturer_code
- hospital_level_code
- ownership_type_code
- order_phase_code
- delivery_state_code
- order_terminal_flag
- order_failure_flag
- return_quantity
- raw_sensitive_purchase_quantity
- raw_sensitive_purchase_amount
- raw_sensitive_delivery_quantity
- raw_sensitive_delivery_amount
- raw_sensitive_arrival_quantity
- raw_sensitive_arrival_amount
- delivery_rate
- arrival_rate
- overall_arrival_rate
- delivery_amount_to_purchase_amount_ratio
- arrival_amount_to_delivery_amount_ratio
- arrival_amount_to_purchase_amount_ratio
derived_columns:
- alias: province_code
  source: county_code
- alias: city_code
  source: county_code
- alias: region_dirty_flag
  source: county_code/raw_city_code
- alias: drug_code_match_flag
  source: drug_code/insurance_drug_code
- alias: drug_code_conflict_flag
  source: drug_code/insurance_drug_code
- alias: order_phase_code
  source: order_status_raw
- alias: delivery_state_code
  source: order_status_raw
- alias: order_terminal_flag
  source: order_status_raw
- alias: order_failure_flag
  source: order_status_raw
- alias: delivery_rate
  source: raw_sensitive_delivery_quantity/raw_sensitive_purchase_quantity
- alias: arrival_rate
  source: raw_sensitive_arrival_quantity/raw_sensitive_delivery_quantity
- alias: overall_arrival_rate
  source: raw_sensitive_arrival_quantity/raw_sensitive_purchase_quantity
desensitization_policy:
  quantity_fields_share_multiplier: q
  quantity_fields:
  - raw_sensitive_purchase_quantity
  - raw_sensitive_delivery_quantity
  - raw_sensitive_arrival_quantity
  - return_quantity
  - void_quantity
  amount_fields_share_multiplier: m
  amount_fields:
  - raw_sensitive_purchase_amount
  - raw_sensitive_delivery_amount
  - raw_sensitive_arrival_amount
  purchase_price_policy: may_be_independently_desensitized_not_core_analysis_field
  allowed_analyses:
  - delivery_rate = raw_sensitive_delivery_quantity / raw_sensitive_purchase_quantity
  - arrival_rate = raw_sensitive_arrival_quantity / raw_sensitive_delivery_quantity
  - overall_arrival_rate = raw_sensitive_arrival_quantity / raw_sensitive_purchase_quantity
  - quantity_trends
  - amount_trends
  - order_frequency_trends
  - relative_relationships_among_amount_fields
  forbidden_analyses:
  - infer_real_unit_price_from_amount_divided_by_quantity
  - validate_purchase_price_against_purchase_amount_divided_by_purchase_quantity
