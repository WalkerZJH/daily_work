    code: 1
    keywords: ["一级", "一等", "1级"]
  - label: 二级
    code: 2
    keywords: ["二级", "二等", "2级"]
  - label: 三级
    code: 3
    keywords: ["三级", "三等", "3级"]
  - label: 其他
    code: 9
    keywords: ["其他"]
